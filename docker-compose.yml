services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ai-stock-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aistock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aistock123}
      POSTGRES_DB: ${POSTGRES_DB:-aistock}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5488:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aistock}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ai-stock-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6388:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-stock-backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-aistock}:${POSTGRES_PASSWORD:-aistock123}@postgres:5432/${POSTGRES_DB:-aistock}
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: ai-stock-frontend
    ports:
      - "3088:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
